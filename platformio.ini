; PlatformIO Project Configuration
; RTOS-Based Industrial Edge Gateway
; Target: STM32F103C8T6 (Blue Pill)

[env:bluepill_f103c8]
platform      = ststm32
board         = bluepill_f103c8
framework     = stm32cube

; Source & include directories
src_dir       = src
include_dirs  = include

; Build flags
build_flags =
    -Iinclude
    -DSTM32F103xB
    -DUSE_HAL_DRIVER
    -DHSE_VALUE=8000000UL
    -O2
    -fno-exceptions
    -fno-rtti
    -Wall
    -Wextra
    -Wno-unused-parameter

; FreeRTOS (via STM32Cube middleware)
lib_deps =
    stm32cube-f1

; Upload & debug
upload_protocol = stlink
debug_tool      = stlink

; Serial monitor (USART1 — PA9)
monitor_speed = 115200
